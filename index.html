<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minggir Lu miskin</title>
  
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5; /* Warna background abu-abu terang */
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .kartu-profil {
      background-color: #ffffff;
      width: 100%;
      max-width: 400px;
      padding: 20px;
      border-radius: 15px; /* Ujung kotak melengkung */
      box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Efek bayangan */
      text-align: center;
    }
    h1 {
      color: #1a1a1a;
      margin-bottom: 5px;
    }
    p {
      color: #666666;
      margin-bottom: 20px;
    }
    .tombol {
      background-color: #008cba;
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
    video {
      border-radius: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>

  <div class="kartu-profil">
    <h1>USBK!</h1>
    <p>Riski kek telek ayam cina jangan marah Ki becanda aja.</p>
    
    <video width="100%" height="auto" autoplay muted loop playsinline>
      <source src="Usbk.mp4" type="video/mp4">
    </video>
    
    <br>
    <a href="#" class="tombol">Hubungi Saya</a>
  </div>

</body>
</html>
